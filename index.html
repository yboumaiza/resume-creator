<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Resume Builder</h1>
            <nav class="tabs">
                <button class="tab active" data-tab="personal">Personal</button>
                <button class="tab" data-tab="education">Education</button>
                <button class="tab" data-tab="experience">Experience</button>
                <button class="tab" data-tab="projects">Projects</button>

                <button class="tab" data-tab="testimonials">Testimonials</button>
                <button class="tab" data-tab="selection">Selection</button>
                <button class="tab" data-tab="preview">Preview</button>
            </nav>
        </header>

        <!-- Personal Tab -->
        <section id="tab-personal" class="tab-content active">
            <h2>Personal Information</h2>
            <form id="personal-form" class="personal-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="full_name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Header / Tagline</label>
                        <input type="text" name="header_text" placeholder="e.g. Full-Stack Developer">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" placeholder="+1 (555) 123-4567">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" placeholder="City, Country">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>LinkedIn</label>
                        <input type="text" name="linkedin" placeholder="https://linkedin.com/in/...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Portfolio / Website</label>
                    <input type="text" name="portfolio" placeholder="https://yoursite.com">
                </div>

                <div class="languages-section">
                    <h3>Languages</h3>
                    <div id="language-rows"></div>
                    <button type="button" class="btn btn-sm language-add-btn" id="add-language-btn">+ Add Language</button>
                </div>

                <div class="personal-form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <span class="save-status" id="personal-save-status"></span>
                </div>
            </form>
        </section>

        <!-- Education Tab -->
        <section id="tab-education" class="tab-content">
            <div class="section-header">
                <h2>Education</h2>
                <button class="btn btn-primary" id="add-education-btn">+ Add Education</button>
            </div>
            <div id="education-list" class="card-list"></div>
        </section>

        <!-- Experience Tab -->
        <section id="tab-experience" class="tab-content">
            <div class="section-header">
                <h2>Work Experience</h2>
                <button class="btn btn-primary" id="add-experience-btn">+ Add Experience</button>
            </div>
            <div id="experience-list" class="card-list"></div>
        </section>

        <!-- Projects Tab -->
        <section id="tab-projects" class="tab-content">
            <div class="section-header">
                <h2>Projects</h2>
                <button class="btn btn-primary" id="add-project-btn">+ Add Project</button>
            </div>
            <div id="project-list" class="card-list"></div>
        </section>

        <!-- Testimonials Tab -->
        <section id="tab-testimonials" class="tab-content">
            <div class="section-header">
                <h2>Testimonials</h2>
                <button class="btn btn-primary" id="add-testimonial-btn">+ Add Testimonial</button>
            </div>
            <div id="testimonial-list" class="card-list"></div>
        </section>

        <!-- Selection Tab -->
        <section id="tab-selection" class="tab-content">
            <h2>Selection</h2>
            <div class="selection-form">
                <label for="job-description">Target Job Description</label>
                <textarea id="job-description" rows="6" placeholder="Paste the job description you're applying for..."></textarea>

                <div class="selection-columns">
                    <div class="selection-col">
                        <h3>Select Experience</h3>
                        <div id="experience-checkboxes" class="checkbox-list"></div>
                    </div>
                    <div class="selection-col">
                        <h3>Select Projects</h3>
                        <div id="project-checkboxes" class="checkbox-list"></div>
                    </div>
                </div>

                <button class="btn btn-primary btn-selection" id="selection-btn">Generate</button>
            </div>

            <div id="selection-results" class="results hidden">
                <div id="results-content"></div>
            </div>

            <div id="view-preview-btn-container" class="view-preview-container hidden">
                <button class="btn btn-primary" id="view-preview-btn">View in Preview</button>
            </div>
        </section>

        <!-- Preview Tab -->
        <section id="tab-preview" class="tab-content">
            <h2>Preview</h2>
            <div id="editable-results">
                <div id="result-objective" class="result-slot hidden"></div>
                <div id="result-experiences" class="result-slot hidden"></div>
                <div id="result-projects" class="result-slot hidden"></div>
            </div>
            <p id="preview-empty" class="empty-state">No generated content yet. Go to the Selection tab to create resume content.</p>
        </section>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/personal.js"></script>
    <script src="js/education.js"></script>
    <script src="js/experience.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/testimonials.js"></script>
    <script src="js/selection.js"></script>
</body>
</html>
