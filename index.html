<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Resume Builder</h1>
            <nav class="tabs">
                <button class="tab active" data-tab="experience">Experience</button>
                <button class="tab" data-tab="projects">Projects</button>
                <button class="tab" data-tab="generate">Generate</button>
            </nav>
        </header>

        <!-- Experience Tab -->
        <section id="tab-experience" class="tab-content active">
            <div class="section-header">
                <h2>Work Experience</h2>
                <button class="btn btn-primary" id="add-experience-btn">+ Add Experience</button>
            </div>
            <div id="experience-list" class="card-list"></div>
        </section>

        <!-- Projects Tab -->
        <section id="tab-projects" class="tab-content">
            <div class="section-header">
                <h2>Projects</h2>
                <button class="btn btn-primary" id="add-project-btn">+ Add Project</button>
            </div>
            <div id="project-list" class="card-list"></div>
        </section>

        <!-- Generate Tab -->
        <section id="tab-generate" class="tab-content">
            <h2>Generate Resume Content</h2>
            <div class="generate-form">
                <label for="job-description">Target Job Description</label>
                <textarea id="job-description" rows="6" placeholder="Paste the job description you're applying for..."></textarea>

                <div class="selection-columns">
                    <div class="selection-col">
                        <h3>Select Experience</h3>
                        <div id="experience-checkboxes" class="checkbox-list"></div>
                    </div>
                    <div class="selection-col">
                        <h3>Select Projects</h3>
                        <div id="project-checkboxes" class="checkbox-list"></div>
                    </div>
                </div>

                <button class="btn btn-primary btn-generate" id="generate-btn">Generate</button>
            </div>

            <div id="generate-results" class="results hidden">
                <div id="results-content"></div>
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/experience.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/generate.js"></script>
</body>
</html>
